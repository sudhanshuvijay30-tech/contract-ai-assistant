services:
  contract-ai-assistant-api:
    build: .
    container_name: contract-ai-assistant-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  contract-ai-assistant-ui:
    build: .
    container_name: contract-ai-assistant-ui
    command:
      [
        "streamlit",
        "run",
        "app/ui/streamlit_app.py",
        "--server.address",
        "0.0.0.0",
        "--server.port",
        "8501",
      ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      STREAMLIT_API_BASE_URL: http://contract-ai-assistant-api:8000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      contract-ai-assistant-api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health').read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
