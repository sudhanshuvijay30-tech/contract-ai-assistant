services:
  postgres:
    image: postgres:16-alpine
    container_name: contract-ai-assistant-postgres
    environment:
      POSTGRES_DB: contract_ai
      POSTGRES_USER: contract_ai
      POSTGRES_PASSWORD: contract_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_ai -d contract_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: contract-ai-assistant-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  contract-ai-assistant-api:
    build: .
    container_name: contract-ai-assistant-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://contract_ai:contract_ai@postgres:5432/contract_ai
      JOB_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  contract-ai-assistant-worker:
    build: .
    container_name: contract-ai-assistant-worker
    command: ["rq", "worker", "contract-ai-assistant", "--url", "redis://redis:6379/0"]
    env_file:
      - .env
    environment:
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://contract_ai:contract_ai@postgres:5432/contract_ai
      JOB_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  contract-ai-assistant-ui:
    build: .
    container_name: contract-ai-assistant-ui
    command:
      [
        "streamlit",
        "run",
        "app/ui/streamlit_app.py",
        "--server.address",
        "0.0.0.0",
        "--server.port",
        "8501",
      ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      STREAMLIT_API_BASE_URL: http://contract-ai-assistant-api:8000
      STREAMLIT_API_TOKEN: ${API_AUTH_TOKEN:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      contract-ai-assistant-api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health').read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data:
